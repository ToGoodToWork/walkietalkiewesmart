name: WalkieTalk
options:
  bundleIdPrefix: com.adrian
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: WalkieTalk/Config/Debug.xcconfig
  Release: WalkieTalk/Config/Release.xcconfig

targets:
  WalkieTalk:
    type: application
    platform: iOS
    sources:
      - path: WalkieTalk
        excludes:
          - "Config/*.xcconfig"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adrian.walkietalkie
        PRODUCT_NAME: WalkieTalk
        INFOPLIST_FILE: WalkieTalk/Info.plist
        TARGETED_DEVICE_FAMILY: "1"           # iPhone only
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: NO
    configFiles:
      Debug: WalkieTalk/Config/Debug.xcconfig
      Release: WalkieTalk/Config/Release.xcconfig
